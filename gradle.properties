org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.packagingOptions.jniLibs.useLegacyPackaging=true
# The Kotlin compile daemon is a separate long-lived JVM process from the Gradle daemon above —
# it does NOT inherit org.gradle.jvmargs, so on Windows (where the JVM platform default charset
# is Cp1252, not UTF-8) it can silently misread .kt source files, embedding mojibake into
# compiled string constants even though the source on disk is correct UTF-8. This is almost
# certainly the actual cause of "garbled text at multiple screens" reports that source-level
# fixes alone didn't explain — force it explicitly rather than relying on JVM/OS defaults.
kotlin.daemon.jvm.options=-Dfile.encoding=UTF-8